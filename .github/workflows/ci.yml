name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify server loads
        run: node -e "import('./server/server.mjs')"
      - name: Verify CLI
        run: node bin/cli.mjs --help
